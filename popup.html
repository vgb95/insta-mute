<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 220px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      text-align: center;
      background: #f8f9fa;
    }
    .emoji { font-size: 36px; margin-bottom: 6px; }
    h1 {
      font-size: 17px;
      font-weight: 700;
      margin: 0 0 4px;
      color: #1a1a2e;
    }
    p {
      font-size: 13px;
      color: #555;
      margin: 0;
      line-height: 1.4;
    }
    hr {
      border: none;
      border-top: 1px solid #e0e0e0;
      margin: 12px 0;
    }
    .footer {
      font-size: 11px;
      color: #999;
    }
    .footer a {
      color: #999;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="emoji">🤫</div>
  <h1>Insta Mute for X</h1>
  <p>Haz clic en 🤫 sobre cualquier tuit para silenciar al autor al instante.</p>
  <hr>
  <div class="footer">v1.0.0</div>
</body>
</html>
